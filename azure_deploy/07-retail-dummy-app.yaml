apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retail-app
  template:
    metadata:
      labels:
        app: retail-app
    spec:
      containers:
      - name: retail-app
        image: hashicorp/http-echo # A tiny web server just for testing
        args:
        - "-text=Welcome to the Retail App Demo!"
        - "-listen=:8080"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: capsule-service # Matching the name in our routing rules
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: retail-app
  ports:
  - port: 80
    targetPort: 8080
