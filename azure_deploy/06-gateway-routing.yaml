apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: default
  annotations:
    # THIS IS THE MAGIC LINE: It tells Azure to create an Internal Load Balancer
    # because Public Load Balancers are blocked on Private Clusters!
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  gatewayClassName: kgateway
  listeners:
  - name: http
    protocol: HTTP
    port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: fitness-route
  namespace: default
spec:
  parentRefs:
  - name: main-gateway
  rules:
  # ---------------------------------------------------------
  # PATH 1: Traffic going to /fitness
  # ---------------------------------------------------------
  - matches:
    - path:
        type: PathPrefix
        value: /fitness
    # This filter removes /fitness before sending it to the pod 
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: fitness-tracker-service
      port: 80

  # ---------------------------------------------------------
  # PATH 1.5: Static Assets for the Fitness App
  # ---------------------------------------------------------
  - matches:
    - path:
        type: PathPrefix
        value: /css
    - path:
        type: PathPrefix
        value: /js
    - path:
        type: PathPrefix
        value: /assets
    - path:
        type: PathPrefix
        value: /pages
    backendRefs:
    - name: fitness-tracker-service
      port: 80

  # ---------------------------------------------------------
  # PATH 2: Traffic going to /retail
  # ---------------------------------------------------------
  - matches:
    - path:
        type: PathPrefix
        value: /retail
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: capsule-service # Your other service from your original HTTP.yml
      port: 80
